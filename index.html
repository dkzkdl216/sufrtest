<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surf Personality Test</title>

<style>
/* 기본 테마 및 배경 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
    padding: 20px;
}

/* 컨테이너 및 카드 디자인 */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px 30px;
    width: 100%;
    max-width: 450px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
}

/* 페이드 인 애니메이션 */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.fade-in {
    animation: fadeIn 0.5s ease-out forwards;
}

h1 {
    font-size: 24px;
    color: #333;
    margin-bottom: 10px;
}

p.subtitle {
    color: #666;
    margin-bottom: 30px;
}

/* 프로그레스 바 */
.progress-container {
    width: 100%;
    height: 8px;
    background-color: #eee;
    border-radius: 10px;
    margin-bottom: 30px;
    overflow: hidden;
}

#progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    transition: width 0.3s ease;
}

/* 버튼 스타일 */
button.start-btn {
    padding: 16px 40px;
    border: none;
    border-radius: 50px;
    background: #0072ff;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
    transition: 0.3s;
}

button.start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 114, 255, 0.6);
}

/* 질문지 스타일 */
.answer {
    padding: 18px;
    margin: 12px 0;
    background: #ffffff;
    border: 2px solid #f0f0f0;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    color: #444;
}

.answer:hover {
    border-color: #0072ff;
    background: #f0f7ff;
    transform: scale(1.02);
    color: #0072ff;
}

/* 결과창 이미지 */
.result-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    margin: 20px 0;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.apply {
    display: block;
    margin-top: 25px;
    padding: 16px;
    background: #ff4b2b;
    color: white;
    border-radius: 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.apply:hover {
    background: #ff416c;
    box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
}

.hidden { display: none; }

</style>
</head>

<body>

<div class="container fade-in">
    <div id="start">
        <h1>🌊 Surf Personality Test</h1>
        <p class="subtitle">너에게 맞는 서핑 스타일은?</p>
        <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <h2 id="question" style="margin-bottom: 20px;"></h2>
        <div id="answers"></div>
    </div>

    <div id="result" class="hidden">
        <h2 id="resultTitle"></h2>
        <img id="resultImg" class="result-img">
        <p id="resultDesc" style="line-height: 1.6; color: #555;"></p>
        <a class="apply" href="https://docs.google.com/forms/..." target="_blank">
            동아리 신청하기
        </a>
    </div>
</div>
