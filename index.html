<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surf Personality Test | 서핑 성향 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0077be;
            --accent-orange: #ff7e5f;
            --bg-gradient: linear-gradient(180deg, #e0f7fa 0%, #80deea 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
        }

        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            color: #333;
        }

        /* 메인 컨테이너 */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 119, 190, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* 배경 파도 장식 */
        .wave-decoration {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 10px;
            background: var(--primary-blue);
            opacity: 0.3;
        }

        /* 버튼 공통 스타일 */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 8px 15px rgba(0, 119, 190, 0.3);
        }

        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0, 119, 190, 0.4); }

        /* 언어 선택 버튼 */
        .lang-select {
            display: flex; justify-content: center; gap: 10px; margin-top: 20px;
        }

        .btn-lang {
            background: white; border: 2px solid var(--primary-blue); color: var(--primary-blue);
        }

        .btn-lang:hover { background: var(--primary-blue); color: white; }

        /* 프로그레스 바 */
        .progress-bar-wrapper {
            width: 100%; height: 10px; background: #eee; border-radius: 5px;
            margin: 25px 0; overflow: hidden;
        }

        .progress-fill {
            width: 0%; height: 100%; background: var(--primary-blue);
            transition: width 0.4s ease;
        }

        /* 질문지 카드 */
        .answer-card {
            background: white;
            padding: 18px;
            margin: 12px 0;
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .answer-card:hover {
            border-color: var(--primary-blue);
            background: #f0faff;
            transform: scale(1.02);
        }

        /* 결과 화면 */
        .result-img {
            width: 100%; height: 250px; object-fit: cover;
            border-radius: 20px; margin: 20px 0;
        }

        .apply-btn {
            display: inline-block;
            background: var(--accent-orange);
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 25px;
        }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container fade-in">
    <div id="start-screen">
        <h1 style="font-size: 2rem; margin-bottom: 10px;">🌊 Surf Test</h1>
        <p id="main-subtitle">당신의 서핑 소울을 찾아보세요</p>
        <div class="lang-select">
            <button class="btn btn-lang" onclick="setLanguage('ko')">한국어</button>
            <button class="btn btn-lang" onclick="setLanguage('en')">English</button>
        </div>
        <button id="start-btn" class="btn btn-primary" onclick="startTest()" style="margin-top: 30px; width: 100%;">Start Test</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar-wrapper">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <h2 id="question-text" style="margin-bottom: 25px;"></h2>
        <div id="answer-list"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="result-title"></h1>
        <img id="result-img" class="result-img" src="" alt="Result">
        <p id="result-desc" style="line-height: 1.6;"></p>
        <a id="apply-link" class="apply-btn" href="https://docs.google.com/forms/..." target="_blank">신청하기 / Apply Now</a>
    </div>

    <div class="wave-decoration"></div>
</div>
