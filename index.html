function start(l){

lang=l
q=0

document.getElementById("app").innerHTML=`
<h2>${data[lang].questions[q].q}</h2>
<div id="answers"></div>
<p class="progress">${q+1}/10</p>
`

show()

}

function show(){

let question=data[lang].questions[q]

let html=""

question.a.forEach(a=>{
html+=`<div class="answer" onclick="select('${a.t}')">${a.text}</div>`
})

document.getElementById("answers").innerHTML=html

}

function select(type){

score[type]++

q++

if(q<10){

document.getElementById("app").innerHTML=`
<h2>${data[lang].questions[q].q}</h2>
<div id="answers"></div>
<p class="progress">${q+1}/10</p>
`

show()

}else{

showResult()

}

}

function showResult(){

let max=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b)

let r=data[lang].results[max]

let link="https://docs.google.com/forms/d/e/1FAIpQLSdUfT1mArajdegkuPpvFVDfW-E7uEoijNLzhviAQCk5fOchiw/viewform"

let text= lang==="ko" ? "동아리 신청하기" : "Apply for the Club"

document.getElementById("app").innerHTML=`

<h2>${r.title}</h2>

<img src="${r.img}">

<p>${r.desc}</p>

<a href="${link}" target="_blank">

<button>${text}</button>

</a>

`

}
